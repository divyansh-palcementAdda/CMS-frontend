<div class="modal-overlay" *ngIf="isVisible">
  <div class="modal-container">
    <div class="modal-header">
      <div class="header-content">
        <h2>Add Fee Payment</h2>
        <p>Record a new payment for <strong>{{ studentName }}</strong></p>
      </div>
      <button class="close-btn" (click)="onClose()">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
          <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <form [formGroup]="paymentForm" (ngSubmit)="onSubmit()">
        <div class="form-grid">
          <!-- Amount -->
          <div class="input-group">
            <label>Amount (₹) <span class="required">*</span></label>
            <div class="input-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="18" height="18" viewBox="0 0 20 20">
                <path fill="currentColor"
                  d="M18 5V3H6v2h4c1.86 0 3.41 1.28 3.86 3H6v2h7.86c-.45 1.72-2 3-3.86 3H7c-.42 0-.79.26-.94.65s-.04.83.28 1.1l8 7l1.32-1.5l-6-5.25H10c2.97 0 5.43-2.17 5.91-5H18V8h-2.09a6 6 0 0 0-1.45-3z" />
              </svg>
              <input type="number" formControlName="amount" placeholder="Enter amount">
            </div>
            <div class="error-msg"
              [class.show]="paymentForm.get('amount')?.touched && paymentForm.get('amount')?.invalid">
              Valid amount is required
            </div>
          </div>

          <!-- Threshold Hint (Sync Case) -->
          <div class="threshold-hint-wrapper" *ngIf="triggeredBySync">
            <div class="threshold-hint-card" [class.reached]="remainingToThreshold === 0">
              <div class="hint-header">
                <svg *ngIf="remainingToThreshold > 0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="16" x2="12" y2="12"></line>
                  <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                <svg *ngIf="remainingToThreshold === 0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                  <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>50% Fee Status Tracking</span>
              </div>
              <div class="hint-body">
                <div class="hint-row">
                  <span>Target (50%):</span>
                  <strong>₹ {{ thresholdAmount | number:'1.0-0' }}</strong>
                </div>
                <div class="hint-row" *ngIf="remainingToThreshold > 0">
                  <span>Remaining:</span>
                  <span class="rem-val">₹ {{ remainingToThreshold | number:'1.0-0' }}</span>
                </div>
                <div class="hint-success" *ngIf="remainingToThreshold === 0">
                  Target reached! Student will be marked as Paid.
                </div>
              </div>
            </div>
          </div>

          <!-- Payment Mode -->
          <div class="input-group">
            <label>Payment Mode <span class="required">*</span></label>
            <div class="input-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" class="icon" height="20" viewBox="0 -960 960 960" width="20"
                fill="currentColor">
                <path
                  d="M880-720v480q0 33-23.5 56.5T800-160H160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720ZM160-720v160h640v-160H160Zm0 240v240h640v-240H160Zm0 0v240-240Z" />
              </svg>
              <select formControlName="paymentMode">
                <option *ngFor="let mode of paymentModes" [value]="mode.value">{{ mode.label }}</option>
              </select>
            </div>
          </div>

          <!-- Reference No -->
          <div class="input-group full-width">
            <label>Reference No. / Transaction ID</label>
            <div class="input-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="18" height="18" viewBox="0 0 24 24">
                <g fill="none">
                  <path
                    d="M19.781 14.555L13.5 16h-.375a1.875 1.875 0 0 0 0-3.75H8.438a2.25 2.25 0 0 0-1.594.656L4.5 15.25v5.25h6.75l6-1.5l3.64-1.552a1.555 1.555 0 0 0-1.109-2.893M4.5 15.25v5.25H1v-5.25z" />
                  <path d="M18.5 2a3.5 3.5 0 1 1-2 6.373l.01-.008a3.5 3.5 0 1 1-.01-5.738a3.5 3.5 0 0 1 2-.627"
                    clip-rule="evenodd" />
                  <path stroke="currentColor" stroke-linecap="square" stroke-width="2"
                    d="M4.5 20.5h6.75l6-1.5l3.64-1.552a1.555 1.555 0 0 0-1.109-2.893L13.5 16h-.375M4.5 20.5v-5.25m0 5.25H1v-5.25h3.5m0 0l2.344-2.344a2.25 2.25 0 0 1 1.593-.656h4.688a1.875 1.875 0 0 1 0 3.75H11m6-13.663a3.5 3.5 0 1 1 0 6.326M14.5 9a3.5 3.5 0 1 1 0-7a3.5 3.5 0 0 1 0 7Z" />
                </g>
              </svg>
              <input type="text" formControlName="referenceNo" placeholder="Enter transaction ID or ref number">
            </div>
          </div>

          <!-- Remarks -->
          <div class="input-group full-width">
            <label>Remarks</label>
            <div class="input-wrapper">
              <textarea formControlName="remarks" placeholder="Optional notes..."></textarea>
            </div>
          </div>
        </div>

        <div *ngIf="error" class="error-banner">
          {{ error }}
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <button class="cancel-btn" (click)="onClose()">Cancel</button>
      <button class="submit-btn" (click)="onSubmit()" [disabled]="isSubmitting || paymentForm.invalid">
        <span *ngIf="!isSubmitting">Add Payment</span>
        <span *ngIf="isSubmitting">Processing...</span>
      </button>
    </div>
  </div>
</div>
