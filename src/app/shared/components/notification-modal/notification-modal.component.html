<div class="modal-overlay" *ngIf="data" (click)="onCancel()" [class.confirm-type]="data.type === 'CONFIRM'">
  <div class="modal-content" (click)="$event.stopPropagation()" [class]="data.type.toLowerCase()">
    <div class="modal-header">
      <div class="icon-box" [class]="data.type.toLowerCase()">
        <ng-container [ngSwitch]="data.type">
          <!-- Success Icon -->
          <svg *ngSwitchCase="'SUCCESS'" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          <!-- Error Icon -->
          <svg *ngSwitchCase="'ERROR'" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
          <!-- Warning Icon -->
          <svg *ngSwitchCase="'WARNING'" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          <!-- Info Icon -->
          <svg *ngSwitchCase="'INFO'" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          <!-- Confirm Icon -->
          <svg *ngSwitchCase="'CONFIRM'" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
        </ng-container>
      </div>
      <h3>{{ data.title }}</h3>
    </div>
    <div class="modal-body">
      <p>{{ data.message }}</p>
    </div>
    <div class="modal-footer">
      <button *ngIf="data.type === 'CONFIRM'" class="btn-secondary" (click)="onCancel()">
        {{ data.cancelLabel || 'Cancel' }}
      </button>
      <button class="btn-primary" [class]="data.type.toLowerCase()" (click)="onConfirm()">
        {{ data.confirmLabel || (data.type === 'CONFIRM' ? 'Confirm' : 'OK') }}
      </button>
    </div>
  </div>
</div>
